name: ci

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: '25 16 * * *'

defaults:
  run:
    shell: bash

jobs:
  shared:
    uses: amezin/js-actions-common/.github/workflows/shared-ci.yml@3946b5832865f2403b9fd7aa7ce80d34373dd66e # v1.0.9
    permissions:
      contents: read

  test-docker-simple:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    env:
      IMAGE: ghcr.io/${{ github.repository }}/test-${{ github.run_id }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}

      - id: build1
        uses: docker/build-push-action@v6
        with:
          context: test
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          cache-from: |
            ${{ steps.meta.outputs.tags }}
            ${{ env.IMAGE }}:${{ github.event.repository.default_branch }}
          cache-to: type=inline
          push: true

      - id: build2
        uses: docker/build-push-action@v6
        with:
          context: test
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          cache-from: |
            ${{ steps.meta.outputs.tags }}
            ${{ env.IMAGE }}:${{ github.event.repository.default_branch }}
          cache-to: type=inline
          push: true

      - if: ${{ steps.build1.outcome == 'success' }}
        run: >-
          gh api --method DELETE "$OWNER_URL/packages/container/$PACKAGE_NAME"
        env:
          OWNER_URL: ${{ github.event.repository.owner.url }}
          PACKAGE_NAME: ${{ github.event.repository.name }}%2Ftest-${{ github.run_id }}
          GH_TOKEN: ${{ github.token }}
